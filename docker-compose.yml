version: "3.9"

services:

  db:
    build: ./db
    restart: always
    environment:
      POSTGRES_DB:       sleepsync_db
      POSTGRES_USER:     sleepsync_user
      POSTGRES_PASSWORD: sleepsync_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sleepsync_user -d sleepsync_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: always
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pg_data: